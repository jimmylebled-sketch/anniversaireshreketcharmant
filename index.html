<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Fort Lointain</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="welcomeScreen">
    <button id="startBtn">🏰 Entrer dans Fort Fort Lointain</button>
</div>
<audio id="music" src="music.mp3" loop></audio>
<audio id="click" src="click.mp3"></audio>
<audio id="magic" src="magic.mp3"></audio>

<div id="intro">

    <img src="castle.jpg" class="castle">

    <h1>🏰 Fort Fort Lointain</h1>

    <p class="subtitle">
        Bienvenue dans le royaume...
        <br><br>
        Chaque habitant possède un destin.
        <br>
        Découvre le tien.
    </p>

    <input
        id="name"
        type="text"
        placeholder="Ton prénom">

    <button id="discover">
        Découvrir mon rôle
    </button>

</div>

<div id="bookScreen" class="hidden">

    <img src="book.jpg" id="book">

    <div id="roleContainer">

        <h2>Ton rôle est...</h2>

        <h1 id="role"></h1>

        <p>
            🤫 Garde ce rôle secret jusqu'au début de la soirée.
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
